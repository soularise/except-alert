services:
  relay:
    build: ../relay
    ports:
      - "3800:3800"
    environment:
      DATABASE_URL: postgres://relay:relay@postgres:5432/relay
      RELAY_PORT: "3800"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  exceptalert:
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-except-alert-local-dev-secret-change-me}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://relay:relay@postgres:5432/relay
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-except-alert-local-dev-secret-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      RELAY_URL: ${RELAY_URL:-http://relay:3800}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
